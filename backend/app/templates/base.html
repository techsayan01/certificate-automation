<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Certificate Automation{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css"/>
</head>
<body>
  {% if user %}
    <nav class="topnav">
      <div class="brand">Certificate Automation</div>
      <div class="links">
        {% if user.role == "admin" %}
          <a href="/admin/festivals" class="{% if request.url.path.startswith('/admin/festivals') %}active{% endif %}">Festivals</a>
          <a href="/admin/users" class="{% if request.url.path.startswith('/admin/users') %}active{% endif %}">Users</a>
          <a href="/admin/profile" class="{% if request.url.path.startswith('/admin/profile') %}active{% endif %}">Profile</a>
        {% else %}
          <a href="/festival/send" class="{% if '/send' in request.url.path %}active{% endif %}">Send certificates</a>
          <a href="/festival/manage" class="{% if request.url.path.startswith('/festival/manage') or request.url.path.startswith('/festival/templates') %}active{% endif %}">Manage</a>
          <a href="/festival/runs" class="{% if '/runs' in request.url.path %}active{% endif %}">Runs</a>
          <a href="/festival/settings" class="{% if '/settings' in request.url.path %}active{% endif %}">Settings</a>
        {% endif %}
      </div>
      <div class="user-menu">
        <span class="email">{{ user.email }}</span>
        <span class="role badge badge-{{ user.role }}">{{ user.role }}</span>
        <form method="post" action="/logout" class="inline">
          <button type="submit" class="link">Sign out</button>
        </form>
      </div>
    </nav>
  {% endif %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
