{% extends "base.html" %}
{% block title %}New user{% endblock %}
{% block content %}
<div class="page-header">
  <h1>New user</h1>
  <a href="/admin/users" class="btn">← Back</a>
</div>

<form method="post" action="/admin/users" class="card">
  <label>Email
    <input type="email" name="email" required autofocus/>
  </label>

  <label>Password
    <input type="password" name="password" required minlength="8"/>
    <small class="muted">At least 8 characters.</small>
  </label>

  <label>Role
    <select name="role" required id="role-select" onchange="toggleFestival()">
      <option value="festival_user">Festival user</option>
      <option value="admin">Admin</option>
    </select>
  </label>

  <div id="festival-row">
    <label>Festival
      <select name="festival_id">
        <option value="">— select a festival —</option>
        {% for f in festivals %}
          <option value="{{ f.id }}">{{ f.name }}</option>
        {% endfor %}
      </select>
      <small class="muted">Required when role is Festival user.</small>
    </label>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Create user</button>
    <a href="/admin/users" class="btn">Cancel</a>
  </div>
</form>

<script>
  function toggleFestival() {
    const role = document.getElementById("role-select").value;
    document.getElementById("festival-row").style.display = role === "admin" ? "none" : "";
  }
</script>
<style>
  .form-actions { margin-top: 24px; display: flex; gap: 12px; }
  small.muted { display: block; margin-top: 4px; font-size: 12px; font-weight: 400; }
</style>
{% endblock %}
